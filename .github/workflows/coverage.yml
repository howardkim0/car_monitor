# Re-runs the same coverage check githooks/pre-commit does, as a backstop
# for a bypassed local hook or a fresh clone without hooks configured (see
# CLAUDE.md's "Coverage is enforced" section and DESIGN.md section 13).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions),
# only needed if go-coverage's check ever actually fails — it's a Gmail
# account with an app password (not the account password itself):
#   MAIL_USERNAME  the sending Gmail address
#   MAIL_PASSWORD  a Gmail app password for that address
name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-coverage:
    name: Go coverage (100% gate)
    runs-on: ubuntu-latest
    permissions:
      contents: write # only used to commit the coverage badge, on push to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Run tests with coverage
        id: coverage
        working-directory: go
        run: |
          go test -coverprofile=coverage.out ./...
          total="$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')"
          echo "Total statement coverage: ${total}%"
          echo "total=${total}" >> "$GITHUB_OUTPUT"

      # Generated and committed here (not just checked) so the README's
      # badge is a real, workflow-updated file — see scripts/make_badge.py.
      # Runs before the floor check below so a regression still updates the
      # badge (in red) instead of leaving a stale "100%" badge behind on a
      # failed run.
      - name: Generate coverage badge
        run: |
          color="#4c1"
          awk -v t="${{ steps.coverage.outputs.total }}" 'BEGIN { exit !(t + 0 < 100) }' && color="#e05d44"
          python3 scripts/make_badge.py coverage "${{ steps.coverage.outputs.total }}%" "$color" docs/badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges/coverage.svg
          if ! git diff --staged --quiet; then
            git commit -m "Update coverage badge [skip ci]"
            git push
          fi

      - name: Check 100% floor
        id: check
        run: |
          below="$(awk -v t="${{ steps.coverage.outputs.total }}" 'BEGIN { print (t + 0 < 100) ? "true" : "false" }')"
          echo "below=${below}" >> "$GITHUB_OUTPUT"

      - name: Email on regression
        if: steps.check.outputs.below == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Car Monitor CI <${{ secrets.MAIL_USERNAME }}>
          to: tbphotography4761@gmail.com
          subject: "car_monitor: Go coverage dropped to ${{ steps.coverage.outputs.total }}%"
          body: |
            go/ statement coverage is ${{ steps.coverage.outputs.total }}%, below the 100% floor
            required by githooks/pre-commit and CLAUDE.md.

            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail if below floor
        if: steps.check.outputs.below == 'true'
        run: |
          echo "Coverage ${{ steps.coverage.outputs.total }}% is below the required 100% floor" >&2
          exit 1

  android-tests:
    name: Android unit tests (informational coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-gomobile-android

      - name: Build mobile.aar
        working-directory: go/mobile
        env:
          CGO_LDFLAGS: "-Wl,-z,max-page-size=16384"
        run: gomobile bind -androidapi 26 -o ../../android/app/libs/mobile.aar -target=android ./...

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest koverHtmlReportDebug koverXmlReportDebug --console=plain

      - name: Print coverage percentage
        if: always()
        run: python3 scripts/print_kover_coverage.py android/app/build/reports/kover/reportDebug.xml

      - name: Upload Kover report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-kover-report
          path: android/app/build/reports/kover/htmlDebug/
